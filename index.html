<!DOCTYPE html>
<html lang="si">
<head>
    <script src='//libtl.com/sdk.js' data-zone='10644912' data-sdk='show_10644912'></script>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Film Request Bot</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        body {
            background-color: #0e1621; color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0;
        }
        .app-container {
            width: 90%; max-width: 400px; background: #17212b;
            padding: 30px; border-radius: 20px; text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        h2 { color: #52a8ff; margin-bottom: 20px; }
        input {
            width: 100%; padding: 12px; margin-bottom: 20px;
            border-radius: 10px; border: 1px solid #242f3d;
            background: #242f3d; color: white; outline: none; box-sizing: border-box;
            font-size: 16px;
        }
        .btn {
            width: 100%; padding: 15px; border-radius: 10px; border: none;
            font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s;
            margin-bottom: 10px;
        }
        #unlockBtn { 
            background: linear-gradient(90deg, #f39c12, #e67e22); 
            color: #fff; 
        }
        #unlockBtn:active { transform: scale(0.98); }
        
        #submitBtn { 
            background: #2ecc71; color: white; display: none; 
        }
        .status { font-size: 13px; color: #808d9a; margin-top: 10px; }
    </style>
</head>
<body>

<div class="app-container">
    <h2>🎬 Movie Request</h2>
    <input type="text" id="movieInput" placeholder="Film එකේ නම මෙතන ගහන්න...">
    
    <button id="unlockBtn" class="btn" onclick="showTelegramAd()">🔓 Unlock (Watch 3 Ads)</button>
    
    <button id="submitBtn" class="btn" onclick="sendToBot()">🚀 Submit Request</button>
    
    <p class="status" id="statusText">Request එක යවන්න ඇඩ් 3ක් බලන්න.</p>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    let adCount = 0;
    const requiredAds = 3;

    function showTelegramAd() {
        // ඔයාගේ Zone ID එක හරහා ඇඩ් එක පෙන්වීම
        if (typeof show_10644912 === 'function') {
            show_10644912().then(() => {
                // ඇඩ් එක සාර්ථකව බැලුවාම
                adCount++;
                updateStatus();
            }).catch((e) => {
                console.error("Ad Error:", e);
                alert("ඇඩ් එක ප්ලේ වුණේ නැහැ. කරුණාකර නැවත උත්සාහ කරන්න.");
            });
        } else {
            alert("Ads loading... කරුණාකර තත්පර කිහිපයක් රැඳී සිටින්න.");
        }
    }

    function updateStatus() {
        const btn = document.getElementById('unlockBtn');
        const statusText = document.getElementById('statusText');
        const remaining = requiredAds - adCount;

        if (adCount < requiredAds) {
            btn.innerText = `🔓 Watch ${remaining} more to Unlock`;
            statusText.innerText = `තව ඇඩ් ${remaining}ක් බලන්න.`;
        } else {
            // ඇඩ් 3ම බැලුවාම බටන් මාරු කරනවා
            btn.style.display = 'none';
            document.getElementById('submitBtn').style.display = 'block';
            statusText.innerText = "දැන් ඔයාට රික්වෙස්ට් එක යවන්න පුළුවන්!";
            statusText.style.color = "#2ecc71";
        }
    }

    function sendToBot() {
        const movieName = document.getElementById('movieInput').value;
        if (movieName.trim() === "") {
            tg.showAlert("කරුණාකර Film එකේ නම ඇතුළත් කරන්න.");
            return;
        }
        
        // Bot වෙත දත්ත යැවීම
        tg.sendData("REQUEST:" + movieName);
        
        // තත්පරයකට පසු ඇප් එක වසා දැමීම
        setTimeout(() => {
            tg.close();
        }, 500);
    }
</script>

</body>
</html>
