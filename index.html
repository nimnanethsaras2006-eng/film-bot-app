<!DOCTYPE html>
<html lang="si">
<head>
    <script src='//libtl.com/sdk.js' data-zone='10644912' data-sdk='show_10644912'></script>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Film Request Bot</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        body {
            background-color: #0e1621; color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0;
            overflow: hidden;
        }
        .app-container {
            width: 85%; max-width: 400px; background: #17212b;
            padding: 30px; border-radius: 20px; text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            border: 1px solid #242f3d;
        }
        h2 { color: #52a8ff; margin-bottom: 10px; font-size: 24px; }
        p.desc { color: #808d9a; font-size: 14px; margin-bottom: 20px; }
        
        input {
            width: 100%; padding: 14px; margin-bottom: 20px;
            border-radius: 12px; border: 1px solid #242f3d;
            background: #242f3d; color: white; outline: none; box-sizing: border-box;
            font-size: 16px;
        }
        input:focus { border-color: #52a8ff; }

        .btn {
            width: 100%; padding: 15px; border-radius: 12px; border: none;
            font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s;
            margin-bottom: 10px;
        }
        
        #unlockBtn { 
            background: linear-gradient(90deg, #f39c12, #e67e22); 
            color: #fff; 
            box-shadow: 0 4px 15px rgba(243, 156, 18, 0.3);
        }
        #unlockBtn:active { transform: scale(0.96); }
        
        #submitBtn { 
            background: #2ecc71; color: white; display: none; 
            box-shadow: 0 4px 15px rgba(46, 204, 113, 0.3);
        }
        
        .status { font-size: 13px; color: #808d9a; margin-top: 15px; }
        .counter-badge {
            display: inline-block; background: #242f3d; padding: 2px 10px;
            border-radius: 10px; color: #52a8ff; font-weight: bold; margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div class="app-container">
    <h2>🎬 Film Request</h2>
    <p class="desc">ඔයාට අවශ්‍ය Film එකේ නම ඇතුළත් කරන්න.</p>
    
    <div class="counter-badge" id="adCounterDisplay">Ads Watched: 0/3</div>
    
    <input type="text" id="movieInput" placeholder="Movie Name Here...">
    
    <button id="unlockBtn" class="btn" onclick="showTelegramAd()">🔓 Watch Ad to Unlock</button>
    
    <button id="submitBtn" class="btn" onclick="sendToBot()">🚀 Submit Request</button>
    
    <p class="status" id="statusText">Request එක Unlock කිරීමට ඇඩ් 3ක් බලන්න.</p>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    let adCount = 0;
    const requiredAds = 3;

    function showTelegramAd() {
        // Moneytag SDK එක තියෙනවාද බලනවා
        if (typeof show_10644912 === 'function') {
            // Button එක තාවකාලිකව Disable කරනවා එක පිට එක එබීම වැළැක්වීමට
            const btn = document.getElementById('unlockBtn');
            btn.disabled = true;
            btn.innerText = "Loading Ad...";

            show_10644912().then(() => {
                // ඇඩ් එක සාර්ථකව බැලුවාම
                adCount++;
                btn.disabled = false;
                updateStatus();
            }).catch((e) => {
                btn.disabled = false;
                btn.innerText = "🔓 Watch Ad to Unlock";
                console.error("Ad Error:", e);
                // ඇඩ් එකක් ලෝඩ් නොවීමට හේතුව පෙන්වනවා
                alert("දැනට පෙන්වීමට ඇඩ් එකක් සූදානම් නැත. කරුණාකර තත්පර 10ක් රැඳී සිට නැවත උත්සාහ කරන්න.");
            });
        } else {
            alert("Ads තාම Load වෙනවා... කරුණාකර තත්පර කිහිපයකින් උත්සාහ කරන්න.");
        }
    }

    function updateStatus() {
        const btn = document.getElementById('unlockBtn');
        const statusText = document.getElementById('statusText');
        const counterDisplay = document.getElementById('adCounterDisplay');
        const remaining = requiredAds - adCount;

        counterDisplay.innerText = `Ads Watched: ${adCount}/${requiredAds}`;

        if (adCount < requiredAds) {
            btn.innerText = `🔓 Watch Next Ad (${remaining} left)`;
            statusText.innerText = `තව ඇඩ් ${remaining}ක් බලන්න.`;
        } else {
            // ඇඩ් 3ම බැලුවාම
            btn.style.display = 'none';
            document.getElementById('submitBtn').style.display = 'block';
            counterDisplay.style.background = "#2ecc71";
            counterDisplay.style.color = "#fff";
            statusText.innerText = "සතුටුදායකයි! දැන් Submit කරන්න පුළුවන්.";
            statusText.style.color = "#2ecc71";
        }
    }

    function sendToBot() {
        const movieName = document.getElementById('movieInput').value;
        if (movieName.trim() === "") {
            tg.showAlert("කරුණාකර Film එකේ නම ඇතුළත් කරන්න.");
            return;
        }
        
        // Bot එකට මැසේජ් එක යවනවා
        tg.sendData("FILM_REQUEST: " + movieName);
        
        // ඇප් එක වහනවා
        setTimeout(() => {
            tg.close();
        }, 500);
    }
</script>

</body>
</html>
