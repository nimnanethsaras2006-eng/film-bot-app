<!DOCTYPE html>
<html lang="si">
<head>
    <script src='//libtl.com/sdk.js' data-zone='10644912' data-sdk='show_10644912'></script>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Film Request Bot</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        body { 
            background-color: #0e1621; color: white; 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; margin: 0; 
        }
        .app-container { 
            width: 85%; max-width: 350px; background: #17212b; 
            padding: 25px; border-radius: 20px; text-align: center; 
            border: 1px solid #242f3d; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h2 { color: #52a8ff; font-size: 22px; margin-bottom: 5px; }
        p.desc { font-size: 13px; color: #808d9a; margin-bottom: 20px; }
        
        /* Input Styling */
        .input-box {
            text-align: left; margin-bottom: 15px;
        }
        .input-box label {
            display: block; font-size: 13px; color: #52a8ff; margin-bottom: 5px; margin-left: 5px;
        }
        input { 
            width: 100%; padding: 12px; border-radius: 12px; 
            border: 1px solid #242f3d; background: #242f3d; 
            color: white; box-sizing: border-box; font-size: 15px; outline: none;
        }
        input:focus { border-color: #52a8ff; }

        .btn { 
            width: 100%; padding: 15px; border-radius: 12px; border: none; 
            font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; 
        }
        #unlockBtn { background: #f39c12; color: #fff; margin-top: 10px; }
        #unlockBtn:disabled { background: #555; cursor: not-allowed; }
        #submitBtn { background: #2ecc71; color: white; display: none; margin-top: 10px; }
        
        .status { font-size: 12px; color: #808d9a; margin-top: 15px; }
        .badge { 
            background: #242f3d; padding: 6px 15px; border-radius: 20px; 
            color: #52a8ff; font-size: 13px; font-weight: bold;
            display: inline-block; margin-bottom: 15px; 
        }
    </style>
</head>
<body>

<div class="app-container">
    <h2>🎬 Film Request</h2>
    <p class="desc">අවශ්‍ය තොරතුරු ඇතුළත් කර ඇඩ් බලන්න.</p>
    
    <div class="badge" id="counterDisplay">Ads Watched: 0/3</div>

    <div class="input-box">
        <label>Film Name:</label>
        <input type="text" id="filmName" placeholder="Ex: Avatar 2">
    </div>

    <div class="input-box">
        <label>WhatsApp Number:</label>
        <input type="tel" id="whatsappNum" placeholder="Ex: 0712345678">
    </div>

    <button id="unlockBtn" class="btn" onclick="startAdProcess()">🔓 Watch Ad to Unlock</button>
    <button id="submitBtn" class="btn" onclick="submitToBot()">🚀 Send Request</button>
    
    <p class="status" id="statusMsg">බටන් එක Unlock කිරීමට ඇඩ් 3ක් බලන්න.</p>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    let adCount = 0;
    const totalRequired = 3;

    function startAdProcess() {
        if (typeof show_10644912 === 'function') {
            const btn = document.getElementById('unlockBtn');
            btn.disabled = true;
            btn.innerText = "Ad Loading...";

            show_10644912().then(() => {
                // Ad viewed successfully
                adCount++;
                btn.disabled = false;
                updateInterface();
            }).catch((e) => {
                btn.disabled = false;
                btn.innerText = "🔓 Watch Ad to Unlock";
                alert("Ads දැනට සූදානම් නැත. තත්පර 15ක් රැඳී සිට නැවත උත්සාහ කරන්න.");
            });
        } else {
            alert("Ads තාම Load වෙනවා... පොඩ්ඩක් ඉන්න.");
        }
    }

    function updateInterface() {
        const uBtn = document.getElementById('unlockBtn');
        const sBtn = document.getElementById('submitBtn');
        const counterText = document.getElementById('counterDisplay');
        const msg = document.getElementById('statusMsg');

        counterText.innerText = `Ads Watched: ${adCount}/${totalRequired}`;

        if (adCount < totalRequired) {
            uBtn.innerText = `🔓 Watch Next Ad (${totalRequired - adCount} left)`;
            msg.innerText = `තව ඇඩ් ${totalRequired - adCount}ක් බලන්න.`;
        } else {
            // All ads done
            uBtn.style.display = 'none';
            sBtn.style.display = 'block';
            msg.innerText = "දැන් ඔයාට Request එක එවන්න පුළුවන්!";
            msg.style.color = "#2ecc71";
        }
    }

    function submitToBot() {
        const name = document.getElementById('filmName').value;
        const phone = document.getElementById('whatsappNum').value;

        if (name.trim() === "" || phone.trim() === "") {
            tg.showAlert("කරුණාකර නම සහ WhatsApp අංකය ඇතුළත් කරන්න.");
            return;
        }
        
        // Formatting the final message
        const dataToSend = "🎬 FILM: " + name + "\n📱 WHATSAPP: " + phone;
        
        tg.sendData(dataToSend);
        
        setTimeout(() => {
            tg.close();
        }, 500);
    }
</script>

</body>
</html>
