<!DOCTYPE html>
<html lang="si">
<head>
    <script src='//libtl.com/sdk.js' data-zone='10644912' data-sdk='show_10644912'></script>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Film Request Bot</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        body {
            background-color: #0e1621; color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0;
        }
        .app-container {
            width: 85%; max-width: 350px; background: #17212b;
            padding: 25px; border-radius: 20px; text-align: center;
            border: 1px solid #242f3d;
        }
        h2 { color: #52a8ff; font-size: 22px; margin-bottom: 15px; }
        
        input {
            width: 100%; padding: 12px; margin-bottom: 20px;
            border-radius: 10px; border: 1px solid #242f3d;
            background: #242f3d; color: white; box-sizing: border-box;
        }

        .btn {
            width: 100%; padding: 14px; border-radius: 10px; border: none;
            font-size: 16px; font-weight: bold; cursor: pointer;
        }
        
        /* Unlock Button - මේක දිගටම පේනවා ඇඩ් 3 ඉවර වෙනකම් */
        #unlockBtn { 
            background: #f39c12; color: #fff; 
        }
        
        /* Submit Button - මේක මුලින් පේන්නේ නැහැ */
        #submitBtn { 
            background: #2ecc71; color: white; display: none; 
        }
        
        .status { font-size: 13px; color: #808d9a; margin-top: 15px; }
        .badge {
            background: #242f3d; padding: 5px 15px;
            border-radius: 20px; color: #52a8ff; font-size: 14px;
            display: inline-block; margin-bottom: 15px;
        }
    </style>
</head>
<body>

<div class="app-container">
    <h2>🎬 Film Request</h2>
    <div class="badge" id="counter">Ads Watched: 0/3</div>
    
    <input type="text" id="movieInput" placeholder="Enter Movie Name...">
    
    <button id="unlockBtn" class="btn" onclick="handleAdLogic()">🔓 Watch Ad to Unlock</button>
    
    <button id="submitBtn" class="btn" onclick="sendToBot()">🚀 Submit Request</button>
    
    <p class="status" id="statusText">Request එක යවන්න ඇඩ් 3ක් බලන්න.</p>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    let count = 0;
    const goal = 3;

    function handleAdLogic() {
        if (typeof show_10644912 === 'function') {
            const uBtn = document.getElementById('unlockBtn');
            uBtn.innerText = "Loading Ad...";
            uBtn.disabled = true;

            show_10644912().then(() => {
                count++; // ඇඩ් එකක් බැලුවාම count එක වැඩි කරනවා
                uBtn.disabled = false;
                
                // ඇඩ් ගණන පෙන්වන තැන update කරනවා
                document.getElementById('counter').innerText = `Ads Watched: ${count}/${goal}`;

                if (count < goal) {
                    // තව ඇඩ් බලන්න තියෙනවා නම්
                    uBtn.innerText = `🔓 Watch Next Ad (${goal - count} left)`;
                    document.getElementById('statusText').innerText = `තව ඇඩ් ${goal - count}ක් බලන්න.`;
                } else {
                    // ඇඩ් 3ම බැලුවාම බටන් මාරු කරනවා
                    uBtn.style.display = 'none';
                    document.getElementById('submitBtn').style.display = 'block';
                    document.getElementById('statusText').innerText = "දැන් Submit කරන්න!";
                    document.getElementById('statusText').style.color = "#2ecc71";
                }
            }).catch((e) => {
                uBtn.disabled = false;
                uBtn.innerText = "🔓 Watch Ad to Unlock";
                alert("Ads ලෝඩ් වුණේ නැහැ. තත්පර කිහිපයකින් නැවත උත්සාහ කරන්න.");
            });
        }
    }

    function sendToBot() {
        const movie = document.getElementById('movieInput').value;
        if (movie.trim() === "") {
            tg.showAlert("කරුණාකර නම ඇතුළත් කරන්න.");
            return;
        }
        tg.sendData("REQUEST:" + movie);
        setTimeout(() => tg.close(), 500);
    }
</script>

</body>
</html>
