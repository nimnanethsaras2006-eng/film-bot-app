<!DOCTYPE html>
<html lang="si">
<head>
    <script src='//libtl.com/sdk.js' data-zone='10644912' data-sdk='show_10644912'></script>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Film Request Bot</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        body { background-color: #0e1621; color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .app-container { width: 85%; max-width: 350px; background: #17212b; padding: 25px; border-radius: 20px; text-align: center; border: 1px solid #242f3d; }
        h2 { color: #52a8ff; font-size: 22px; margin-bottom: 5px; }
        p.desc { font-size: 13px; color: #808d9a; margin-bottom: 20px; }
        
        /* Input Styles */
        .input-group { text-align: left; margin-bottom: 15px; }
        label { font-size: 12px; color: #52a8ff; margin-left: 5px; }
        input { 
            width: 100%; padding: 12px; margin-top: 5px;
            border-radius: 10px; border: 1px solid #242f3d; 
            background: #242f3d; color: white; box-sizing: border-box; 
            font-size: 15px; outline: none;
        }
        input:focus { border-color: #52a8ff; }

        .btn { width: 100%; padding: 14px; border-radius: 10px; border: none; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        #unlockBtn { background: #f39c12; color: #fff; }
        #unlockBtn:disabled { background: #555; cursor: not-allowed; }
        #submitBtn { background: #2ecc71; color: white; display: none; }
        
        .status { font-size: 12px; color: #808d9a; margin-top: 15px; }
        .badge { background: #242f3d; padding: 5px 15px; border-radius: 20px; color: #52a8ff; font-size: 14px; display: inline-block; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="app-container">
    <h2>🎬 Film Request</h2>
    <p class="desc">පහත තොරතුරු නිවැරදිව ඇතුළත් කරන්න.</p>
    
    <div class="badge" id="counter">Ads Watched: 0/3</div>

    <div class="input-group">
        <label>Film Name:</label>
        <input type="text" id="movieInput" placeholder="Ex: Avatar 2">
    </div>

    <div class="input-group">
        <label>WhatsApp Number:</label>
        <input type="tel" id="whatsappInput" placeholder="Ex: 0712345678">
    </div>

    <button id="unlockBtn" class="btn" onclick="playAd()">🔓 Watch Ad to Unlock</button>
    <button id="submitBtn" class="btn" onclick="sendToBot()">🚀 Submit Request</button>
    
    <p class="status" id="statusText">Request එක එවන්න ඇඩ් 3ක් බලන්න.</p>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    let count = 0;
    const goal = 3;

    function playAd() {
        if (typeof show_10644912 === 'function') {
            const uBtn = document.getElementById('unlockBtn');
            uBtn.disabled = true;
            uBtn.innerText = "Loading Ad...";

            show_10644912().then(() => {
                count++;
                updateUI();
            }).catch((e) => {
                uBtn.disabled = false;
                uBtn.innerText = "🔓 Watch Ad to Unlock";
                alert("Ads ලෝඩ් වුණේ නැහැ. තත්පර 15ක් රැඳී සිට නැවත උත්සාහ කරන්න.");
            });
        }
    }

    function updateUI() {
        const uBtn = document.getElementById('unlockBtn');
        const sBtn = document.getElementById('submitBtn');
        const counter = document.getElementById('counter');
        const status = document.getElementById('statusText');

        uBtn.disabled = false;
        counter.innerText = `Ads Watched: ${count}/${goal}`;

        if (count < goal) {
            uBtn.innerText = `🔓 Watch Next Ad (${goal - count} left)`;
            status.innerText = `තව ඇඩ් ${goal - count}ක් බලන්න.`;
        } else {
            uBtn.style.display = 'none';
            sBtn.style.display = 'block';
            status.innerText = "දැන් ඔයාට රික්වෙස්ට් එක එවන්න පුළුවන්!";
            status.style.color = "#2ecc71";
        }
    }

    function sendToBot() {
        const movie = document.getElementById('movieInput').value;
        const whatsapp = document.getElementById('whatsappInput').value;

        if (movie.trim() === "" || whatsapp.trim() === "") {
            tg.showAlert("කරුණාකර Film එකේ නම සහ WhatsApp අංකය ඇතුළත් කරන්න.");
            return;
        }
        
        // දත්ත දෙකම එකතු කර මැසේජ් එකක් විදිහට යැවීම
        const finalMessage = `🎬 Movie: ${movie} \n📱 WhatsApp: ${whatsapp}`;
        tg.sendData(finalMessage);
        
        setTimeout(() => tg.close(), 500);
    }
</script>

</body>
</html>
